<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>NamaSound+</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./NamaSoundPlus192.png">
<link rel="apple-touch-icon" href="./NamaSoundPlus192.png">
<style>
  :root {
    --tabbar-h: 30px;
    --bg: #000;
    --fg: #fff;
    --accent: #BAEA1C;
    --muted: #888;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  body {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding-top: env(safe-area-inset-top);
  }

  /* タブバー */
  #tabbar {
    flex: 0 0 auto;
    height: var(--tabbar-h);
    display: flex;
    align-items: stretch;
    background: #000;
    border-bottom: 1px solid #222;
  }
  .tab-btn {
    flex: 1 1 0;
    background: #000;
    color: #fff;
    border: none;
    border-right: 1px solid #222;
    font-size: 0.8rem;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn:last-of-type { border-right: none; }
  .tab-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: bold;
  }
  .tab-btn.gear {
    flex: 0 0 36px;
    font-size: 0.95rem;
  }
  .tab-btn.gear.active { background: #444; color: #fff; }

  /* iframe コンテナ */
  #frames {
    flex: 1 1 auto;
    position: relative;
    background: #000;
    overflow: hidden;
  }
  .frame-wrap {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0;
    display: none;
  }
  .frame-wrap.active { display: block; }
  iframe.app-frame {
    width: 100%; height: 100%;
    border: 0;
    display: block;
    background: #fff;
    transform-origin: top left;
  }

  /* 設定パネル */
  #settingsPanel {
    position: absolute; inset: 0;
    background: #111;
    color: #fff;
    padding: 16px;
    overflow-y: auto;
    display: none;
  }
  #settingsPanel.active { display: block; }
  #settingsPanel h2 {
    margin: 0 0 16px;
    font-size: 1.1rem;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: #1c1c1c;
    border-radius: 10px;
    margin-bottom: 10px;
  }
  .setting-row .label {
    display: flex; flex-direction: column;
  }
  .setting-row .label .title { font-weight: bold; font-size: 0.95rem; }
  .setting-row .label .desc { font-size: 0.75rem; opacity: 0.65; margin-top: 2px; }

  /* スイッチ */
  .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
  .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: #555; border-radius: 26px; transition: 0.2s;
  }
  .slider::before {
    content: ""; position: absolute;
    height: 20px; width: 20px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: 0.2s;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(22px); }

  /* セグメント */
  .seg {
    display: inline-flex;
    border: 1px solid #444; border-radius: 8px; overflow: hidden;
  }
  .seg button {
    background: #1c1c1c; color: #fff; border: none;
    padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
  }
  .seg button.on { background: var(--accent); color: #000; font-weight: bold; }

  .app-links-title {
    font-size: 0.8rem; font-weight: bold; opacity: 0.7;
    margin: 4px 0 8px; padding-left: 2px;
  }
  .app-link-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: #1c1c1c;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .app-link-row a {
    color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.9rem;
  }
  .copy-btn {
    background: #333; color: #fff; border: none; border-radius: 6px;
    padding: 5px 10px; font-size: 0.75rem; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .copy-btn.copied { background: var(--accent); color: #000; }

  .footer-note {
    font-size: 0.7rem; opacity: 0.5; margin-top: 16px; text-align: center;
  }
  /* スケールスライダー */
  #scaleSlider {
    width: 90px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  #scaleValue {
    font-size: 0.85rem; font-weight: bold;
    min-width: 3.2em; text-align: right;
  }

  .wishlist-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 52px; padding: 4px 2px;
  }
  .wishlist-row a { display: flex; align-items: center; opacity: 0.75; transition: opacity 0.2s; }
  .wishlist-row a:hover { opacity: 1; }
  .amazon-badge {
    display: inline-block; width: 85px; height: 35px;
    background-image: url('https://m.media-amazon.com/images/G/09/gno/sprites/nav-sprite-global-1x-reorg-privacy._CB546377955_.png');
    background-position: -5px -85px; background-repeat: no-repeat;
    background-size: auto; flex-shrink: 0; background-color: #000;
  }
  .wishlist-label { font-size: 0.8rem; font-weight: bold; opacity: 0.75; }
</style>
</head>
<body>

<div id="tabbar">
  <button class="tab-btn gear" id="btnSettings" data-tab="settings" aria-label="settings">⚙️</button>
  <button class="tab-btn active" data-tab="meto"  data-i18n="meto">メトロノーム</button>
  <button class="tab-btn"        data-tab="chu"   data-i18n="chu">チューナー</button>
  <button class="tab-btn"        data-tab="ham"   data-i18n="ham">ハーモニー</button>
</div>

<div id="frames">
  <!-- 各子アプリ。loading="lazy" でタブ切替まで読み込まない -->
  <div class="frame-wrap active" data-frame="meto">
    <iframe class="app-frame" data-app="meto"
      src="https://nama1223.github.io/NamaMeto/NamaMeto.html"
      allow="microphone; autoplay; clipboard-read; clipboard-write"
      allowfullscreen></iframe>
  </div>
  <div class="frame-wrap" data-frame="chu">
    <iframe class="app-frame" data-app="chu"
      data-src="https://nama1223.github.io/Namachu/"
      allow="microphone; autoplay"
      allowfullscreen></iframe>
  </div>
  <div class="frame-wrap" data-frame="ham">
    <iframe class="app-frame" data-app="ham"
      data-src="https://nama1223.github.io/NamaHam/"
      allow="microphone; autoplay"
      allowfullscreen></iframe>
  </div>

  <!-- 設定パネル -->
  <div id="settingsPanel">
    <h2 data-i18n="settings_title">⚙️ 設定</h2>

    <div class="setting-row">
      <div class="label">
        <div class="title" data-i18n="lang_title">🌐 言語 / Language</div>
        <div class="desc" data-i18n="lang_desc">3アプリ一括で切り替え</div>
      </div>
      <div class="seg" id="segLang">
        <button data-lang="ja" class="on">日本語</button>
        <button data-lang="en">English</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="label">
        <div class="title"><span id="wakeLockEmoji">😴</span> <span data-i18n="wake_title">スリープ防止</span></div>
        <div class="desc" id="wakeLockStatus" data-i18n="wake_desc">3アプリ一括（画面オン維持）</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="wakeLockToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <div class="label">
        <div class="title" data-i18n="silence_title">🔇 切替時に音を止める</div>
        <div class="desc" data-i18n="silence_desc">タブを切り替えたとき再生中の音を停止</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="silenceToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- 表示サイズ -->
    <div class="setting-row">
      <div class="label">
        <div class="title" data-i18n="scale_title">📐 表示サイズ</div>
        <div class="desc" data-i18n="scale_desc">固定幅アプリ（メトロノーム・チューナー）のみ</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="range" id="scaleSlider" min="50" max="200" step="5" value="100">
        <span id="scaleValue">×1.0</span>
      </div>
    </div>

    <!-- 強制リロード -->
    <div class="setting-row">
      <div class="label">
        <div class="title" data-i18n="reload_title">🔄 強制リロード</div>
        <div class="desc" data-i18n="reload_desc">キャッシュを消去してアプリを最新化</div>
      </div>
      <button id="forceReloadBtn" style="background:#c0392b; color:#fff; border:none; border-radius:8px; padding:7px 14px; font-size:0.85rem; font-weight:bold; cursor:pointer;" data-i18n="reload_btn">リロード</button>
    </div>

    <!-- 各アプリへのリンク -->
    <div style="margin-bottom:4px;">
      <div class="app-links-title" data-i18n="app_links_title">📱 各アプリを直接開く</div>
      <div class="app-link-row">
        <a href="https://nama1223.github.io/NamaMeto/NamaMeto.html" target="_blank" rel="noopener" data-i18n="app_meto">NamaMeto</a>
        <button class="copy-btn" data-copy-url="https://nama1223.github.io/NamaMeto/NamaMeto.html">URLコピー</button>
      </div>
      <div class="app-link-row">
        <a href="https://nama1223.github.io/Namachu/" target="_blank" rel="noopener" data-i18n="app_chu">NamaChu</a>
        <button class="copy-btn" data-copy-url="https://nama1223.github.io/Namachu/">URLコピー</button>
      </div>
      <div class="app-link-row">
        <a href="https://nama1223.github.io/NamaHam/" target="_blank" rel="noopener" data-i18n="app_ham">NamaHam</a>
        <button class="copy-btn" data-copy-url="https://nama1223.github.io/NamaHam/">URLコピー</button>
      </div>
    </div>

    <div class="footer-note">NamaSound+ © nama · Developed with Claude</div>

    <!-- Amazon欲しいものリスト -->
    <div class="wishlist-row">
      <a href="https://www.amazon.jp/hz/wishlist/ls/21PS61YG1P32B?ref_=wl_share" target="_blank" rel="noreferrer noopener">
        <span class="amazon-badge"></span>
      </a>
      <span class="wishlist-label" data-i18n="wishlist">欲しいものリスト</span>
    </div>
  </div>
</div>

<script>
// ===========================
// 設定・状態
// ===========================
const LS = {
  lang: 'nsp_lang',
  wake: 'nsp_wakelock',
  silence: 'nsp_silence_on_switch',
  lastTab: 'nsp_last_tab',
  appScale: 'nsp_app_scale'
};

const CHILD_ORIGIN = 'https://nama1223.github.io';

const I18N = {
  ja: {
    meto: 'メトロノーム', chu: 'チューナー', ham: 'ハーモニー',
    settings_title: '⚙️ 設定',
    lang_title: '🌐 言語 / Language', lang_desc: '3アプリ一括で切り替え',
    wake_title: 'スリープ防止', wake_desc: '3アプリ一括（画面オン維持）',
    silence_title: '🔇 切替時に音を止める', silence_desc: 'タブを切り替えたとき再生中の音を停止',
    app_links_title: '📱 各アプリを直接開く',
    app_meto: 'NamaMeto', app_chu: 'NamaChu', app_ham: 'NamaHam',
    copy: 'URLコピー', copied: 'コピー済み',
    wishlist: '欲しいものリスト',
    reload_title: '🔄 強制リロード', reload_desc: 'キャッシュを消去してアプリを最新化',
    reload_btn: 'リロード', reloading_btn: '処理中...',
    scale_title: '📐 表示サイズ', scale_desc: '固定幅アプリ（メトロノーム・チューナー）のみ'
  },
  en: {
    meto: 'Metronome', chu: 'Tuner', ham: 'Harmony',
    settings_title: '⚙️ Settings',
    lang_title: '🌐 Language', lang_desc: 'Sync across all 3 apps',
    wake_title: 'Keep Awake', wake_desc: 'Sync across all 3 apps',
    silence_title: '🔇 Mute on tab switch', silence_desc: 'Stop playback when switching tabs',
    app_links_title: '📱 Open each app directly',
    app_meto: 'NamaMetro', app_chu: 'NamaTune', app_ham: 'NamaHarmony',
    copy: 'Copy URL', copied: 'Copied!',
    wishlist: 'Wish List',
    reload_title: '🔄 Force Reload', reload_desc: 'Clear cache and update to latest',
    reload_btn: 'Reload', reloading_btn: 'Working...',
    scale_title: '📐 Display Size', scale_desc: 'Fixed-width apps (Metronome & Tuner) only'
  }
};

let state = {
  lang: localStorage.getItem(LS.lang) || (navigator.language.startsWith('ja') ? 'ja' : 'en'),
  wake: localStorage.getItem(LS.wake) === 'true',
  silence: localStorage.getItem(LS.silence) !== 'false',  // 既定 true
  currentTab: localStorage.getItem(LS.lastTab) || 'meto',
  appScale: parseFloat(localStorage.getItem(LS.appScale)) || 1.0
};

// ===========================
// i18n
// ===========================
function applyI18n() {
  const t = I18N[state.lang] || I18N.ja;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
  // コピーボタン（copied状態でない時だけ更新）
  document.querySelectorAll('.copy-btn:not(.copied)').forEach(b => {
    b.textContent = t.copy;
  });
  document.documentElement.lang = state.lang;
  // セグメント表示
  document.querySelectorAll('#segLang button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === state.lang);
  });
}

// 強制リロード（SW解除 → キャッシュ全消去 → reload）
document.getElementById('forceReloadBtn').addEventListener('click', async () => {
  const t = I18N[state.lang] || I18N.ja;
  const btn = document.getElementById('forceReloadBtn');
  btn.textContent = t.reloading_btn;
  btn.disabled = true;
  try {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch(e) {}
  location.reload();
});

// URLコピー
document.getElementById('settingsPanel').addEventListener('click', (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn || btn.classList.contains('copied')) return;
  const url = btn.dataset.copyUrl;
  if (!url) return;
  const t = I18N[state.lang] || I18N.ja;
  const doFeedback = () => {
    btn.textContent = t.copied;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = t.copy;
    }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(doFeedback).catch(() => {});
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    doFeedback();
  }
});

// ===========================
// タブ切替
// ===========================
function switchTab(tab) {
  // 設定パネル
  document.getElementById('settingsPanel').classList.toggle('active', tab === 'settings');

  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  document.querySelectorAll('.frame-wrap').forEach(f => {
    f.classList.toggle('active', f.dataset.frame === tab);
  });

  if (tab !== 'settings') {
    // 遅延ロード（data-src を src へ）
    const wrap = document.querySelector(`.frame-wrap[data-frame="${tab}"]`);
    if (wrap) {
      const ifr = wrap.querySelector('iframe');
      if (ifr && !ifr.src && ifr.dataset.src) ifr.src = ifr.dataset.src;
      // タブ表示後にサイズ確定するため再スケール
      if (ifr && ifr.src) requestAnimationFrame(() => autoScaleIframe(ifr));
    }

    // 切替時に他アプリの音を止める
    if (state.silence) {
      document.querySelectorAll('iframe.app-frame').forEach(ifr => {
        if (ifr.dataset.app !== tab) {
          postToFrame(ifr, { type: 'pauseAll' });
        }
      });
    }

    state.currentTab = tab;
    localStorage.setItem(LS.lastTab, tab);
  }
}

// ===========================
// 子アプリへの postMessage
// ===========================
function postToFrame(ifr, msg) {
  try {
    if (ifr && ifr.contentWindow) {
      ifr.contentWindow.postMessage(msg, CHILD_ORIGIN);
    }
  } catch(e) { /* noop */ }
}
function broadcast(msg) {
  document.querySelectorAll('iframe.app-frame').forEach(ifr => postToFrame(ifr, msg));
}

// 子が読み込まれた直後にも現在の設定を再送する
window.addEventListener('message', (event) => {
  if (event.origin !== CHILD_ORIGIN) return;
  const data = event.data;
  if (!data || typeof data !== 'object') return;
  if (data.type === 'childReady') {
    // 受け取った子に向けて初期状態を流し込む
    const ifr = [...document.querySelectorAll('iframe.app-frame')]
      .find(i => i.contentWindow === event.source);
    if (ifr) {
      postToFrame(ifr, { type: 'setLanguage', lang: state.lang });
      postToFrame(ifr, { type: 'setWakeLock', enabled: state.wake });
    }
  }
});

// iframe の load 時にもフォールバックで送る（childReady未対応の旧版用）
function attachIframeLoadHooks() {
  document.querySelectorAll('iframe.app-frame').forEach(ifr => {
    ifr.addEventListener('load', () => {
      postToFrame(ifr, { type: 'setLanguage', lang: state.lang });
      postToFrame(ifr, { type: 'setWakeLock', enabled: state.wake });
      autoScaleIframe(ifr);
      observeIframeTheme(ifr);  // テーマ変更をリアルタイム検知
    });
  });
}

// スケール値を保持（デッドゾーンスクロール計算に使用）
const iframeScales = new WeakMap();

// ===========================
// 固定幅設計の子アプリを自動スケール
// <meta name="viewport" content="width=450"> のような固定幅指定を読み取り、
// iframe をデザイン幅で描画して transform:scale で実寸に合わせる。
// width=device-width の場合は何もしない（等倍）。
// ===========================
function autoScaleIframe(ifr) {
  try {
    const doc = ifr.contentDocument;
    if (!doc) return;
    const vp = doc.querySelector('meta[name="viewport"]');
    if (!vp) { resetIframeScale(ifr); return; }
    const m = (vp.getAttribute('content') || '').match(/width\s*=\s*(\d+)/);
    if (!m) { resetIframeScale(ifr); return; }
    const designW = parseInt(m[1], 10);
    const wrap = ifr.parentElement;
    const realW = wrap.clientWidth;
    const realH = wrap.clientHeight;
    // ユーザー設定スケール。上限は「横幅ぴったり」まで（はみ出し防止）
    const fitScale = realW / designW;
    const scale = Math.min(fitScale, state.appScale);
    const offsetX = (realW - designW * scale) / 2;
    // 余白の背景色を子アプリのbody背景色に合わせて黒帯を消す
    try {
      const bg = getComputedStyle(doc.body).backgroundColor;
      if (bg && bg !== 'rgba(0, 0, 0, 0)') wrap.style.background = bg;
    } catch(e2) {}
    ifr.style.position = 'absolute';
    ifr.style.left = '0';
    ifr.style.top = '0';
    ifr.style.width  = designW + 'px';
    ifr.style.height = (realH / scale) + 'px';
    ifr.style.transformOrigin = 'top left';
    ifr.style.transform = `translateX(${offsetX}px) scale(${scale})`;
    iframeScales.set(ifr, scale);
  } catch(e) { /* cross-origin等 */ }
}
function resetIframeScale(ifr) {
  ifr.style.width = '';
  ifr.style.height = '';
  ifr.style.transform = '';
  ifr.style.position = '';
  ifr.style.left = '';
  ifr.style.top = '';
}
// NamaMeto の data-theme → 背景色マッピング
const NAMAMETO_THEME_BG = {
  'beige':   '#dccaaf',
  'dark':    '#121212',
  'light':   '#f5f3cd',
  'darkred': '#2b0f0f',
  'navy':    '#0d1b35',
  'green':   '#daeeda'
};

// ===========================
// テーマ変更をリアルタイム検知して背景色を同期
// MutationObserver（即時）+ setInterval（取りこぼし補完）の二刀流
// ===========================
function observeIframeTheme(ifr) {
  // 前回のObserver/Intervalをクリア（再ロード時の重複防止）
  if (ifr._themeObserver) { ifr._themeObserver.disconnect(); ifr._themeObserver = null; }
  if (ifr._themeInterval) { clearInterval(ifr._themeInterval); ifr._themeInterval = null; }
  try {
    const doc = ifr.contentDocument;
    if (!doc) return;
    const syncBg = () => {
      try {
        let bg = null;
        // NamaMeto: body の data-theme 属性から直接マッピング
        const theme = doc.body.getAttribute('data-theme');
        if (theme && NAMAMETO_THEME_BG[theme]) {
          bg = NAMAMETO_THEME_BG[theme];
        } else {
          // NamaChu / NamaHam: getComputedStyle フォールバック
          const htmlBg = getComputedStyle(doc.documentElement).backgroundColor;
          const bodyBg = getComputedStyle(doc.body).backgroundColor;
          bg = (htmlBg && htmlBg !== 'rgba(0, 0, 0, 0)') ? htmlBg : bodyBg;
        }
        if (bg && bg !== 'rgba(0, 0, 0, 0)') ifr.parentElement.style.background = bg;
      } catch(e2) {}
    };
    // MutationObserver: data-theme / style / class の変化を即検知
    const observer = new MutationObserver(syncBg);
    observer.observe(doc.body, {
      attributes: true,
      attributeFilter: ['data-theme', 'style', 'class']
    });
    observer.observe(doc.documentElement, {
      attributes: true,
      attributeFilter: ['data-theme', 'style', 'class']
    });
    ifr._themeObserver = observer;
    // ポーリング: 取りこぼし補完（1.5秒ごと）
    ifr._themeInterval = setInterval(syncBg, 1500);
  } catch(e) {}
}

// ===========================
// iframe外の余白エリアからのスクロールを iframe 内に転送
// ===========================
function addDeadZoneScrollBridge(wrap, ifr) {
  let _startY = null;
  wrap.addEventListener('touchstart', (e) => {
    if (e.target === wrap) _startY = e.touches[0].clientY;
  }, { passive: true });
  wrap.addEventListener('touchmove', (e) => {
    if (e.target !== wrap || _startY === null) return;
    const dy = _startY - e.touches[0].clientY;
    _startY = e.touches[0].clientY;
    try {
      const scale = iframeScales.get(ifr) || 1.0;
      ifr.contentWindow.scrollBy({ top: dy / scale, behavior: 'instant' });
    } catch(e2) {}
  }, { passive: true });
  wrap.addEventListener('touchend',   () => { _startY = null; });
  wrap.addEventListener('touchcancel', () => { _startY = null; });
}

function rescaleAllIframes() {
  document.querySelectorAll('iframe.app-frame').forEach(ifr => {
    if (ifr.src) autoScaleIframe(ifr);
  });
}
window.addEventListener('resize', rescaleAllIframes);
window.addEventListener('orientationchange', () => setTimeout(rescaleAllIframes, 200));

// ===========================
// 親側 WakeLock（任意・子側がやってくれるが念のため親でも保持）
// ===========================
let _parentWakeLock = null;
async function applyParentWakeLock(on) {
  if (!('wakeLock' in navigator)) return;
  try {
    if (on && !_parentWakeLock) {
      _parentWakeLock = await navigator.wakeLock.request('screen');
      _parentWakeLock.addEventListener('release', () => { _parentWakeLock = null; });
    } else if (!on && _parentWakeLock) {
      await _parentWakeLock.release();
      _parentWakeLock = null;
    }
  } catch(e) { /* noop */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.wake) applyParentWakeLock(true);
});

// ===========================
// イベントバインド
// ===========================
document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => switchTab(b.dataset.tab));
});

document.getElementById('segLang').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  state.lang = btn.dataset.lang;
  localStorage.setItem(LS.lang, state.lang);
  applyI18n();
  broadcast({ type: 'setLanguage', lang: state.lang });
});

document.getElementById('wakeLockToggle').addEventListener('change', (e) => {
  state.wake = e.target.checked;
  localStorage.setItem(LS.wake, state.wake ? 'true' : 'false');
  document.getElementById('wakeLockEmoji').textContent = state.wake ? '🥺' : '😴';
  applyParentWakeLock(state.wake);
  broadcast({ type: 'setWakeLock', enabled: state.wake });
});

document.getElementById('silenceToggle').addEventListener('change', (e) => {
  state.silence = e.target.checked;
  localStorage.setItem(LS.silence, state.silence ? 'true' : 'false');
});

document.getElementById('scaleSlider').addEventListener('input', (e) => {
  state.appScale = parseInt(e.target.value) / 100;
  localStorage.setItem(LS.appScale, state.appScale);
  document.getElementById('scaleValue').textContent = `×${state.appScale.toFixed(1)}`;
  rescaleAllIframes();
});

// ===========================
// 初期化
// ===========================
function init() {
  applyI18n();
  document.getElementById('wakeLockToggle').checked = state.wake;
  document.getElementById('wakeLockEmoji').textContent = state.wake ? '🥺' : '😴';
  document.getElementById('silenceToggle').checked = state.silence;
  const slider = document.getElementById('scaleSlider');
  slider.value = Math.round(state.appScale * 100);
  document.getElementById('scaleValue').textContent = `×${state.appScale.toFixed(1)}`;
  attachIframeLoadHooks();
  // 余白エリアのタッチをiframe内スクロールに橋渡し
  document.querySelectorAll('.frame-wrap').forEach(wrap => {
    const ifr = wrap.querySelector('iframe.app-frame');
    if (ifr) addDeadZoneScrollBridge(wrap, ifr);
  });
  switchTab(state.currentTab);
  if (state.wake) applyParentWakeLock(true);

  // Service Worker 登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
